server:
  port: 8080
  servlet:
    async:
      timeout: 300000
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:ollama}

  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  application:
    name: smart-quiz-ai-hub

  datasource:
    url: jdbc:mysql://localhost:3306/quizhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s
    cache-names: techStacks,topics,mcqCount,analytics,reviewers

  sql:
    init:
      mode: always

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB

  mail:
    host: ${MAIL_HOST:smtp.office365.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

app:
  jwt:
    secret: ${JWT_SECRET:QuizHubAI-Hack-N-Stack-2026-SecretKey-Min32Chars!}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001
  upload:
    max-rows: 500
  url: ${APP_URL:http://localhost:3000}

management:
  health:
    mail:
      enabled: false

logging:
  level:
    root: INFO
    com.accenture.quizhub: DEBUG
    org.springframework.security: WARN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
