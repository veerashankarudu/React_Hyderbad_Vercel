server:
  port: 8080
  shutdown: graceful
  servlet:
    async:
      timeout: 300000
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024
  tomcat:
    max-http-form-post-size: 2MB
    max-swallow-size: 2MB

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:ollama}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
          max-tokens: 800
          temperature: 0.3

  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiChatAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiImageAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  application:
    name: smart-quiz-ai-hub

  datasource:
    url: jdbc:mysql://localhost:3306/quizhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  cache:
    type: none   # managed by CacheConfig.java (Redis with Caffeine fallback)
    cache-names: techStacks,topics,mcqCount,analytics,reviewers

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 1000ms

  sql:
    init:
      mode: always

  flyway:
    enabled: false       # disabled locally — uses data.sql seed instead
    # Set to true in application-prod.yml after creating V1__init.sql baseline

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB

  mail:
    host: ${MAIL_HOST:smtp.office365.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

app:
  jwt:
    secret: ${JWT_SECRET:QuizHubAI-Hack-N-Stack-2026-SecretKey-Min32Chars!}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001
  upload:
    max-rows: 500
  url: ${APP_URL:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,caches
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    prometheus:
      enabled: true
    loggers:
      enabled: true
    caches:
      enabled: true
  health:
    mail:
      enabled: false
    redis:
      enabled: true
    db:
      enabled: true
  metrics:
    tags:
      application: quizhub
      environment: ${SPRING_PROFILES_ACTIVE:local}
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1000ms, 2000ms

logging:
  level:
    root: INFO
    com.accenture.quizhub: DEBUG
    org.springframework.security: WARN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
