# ─────────────────────────────────────────────────────────────────
#  Production profile overrides
#  Activate with: SPRING_PROFILES_ACTIVE=prod
#  All secrets MUST be supplied via environment variables.
#  No fallback defaults are provided here — startup fails fast
#  if a required env var is missing.
# ─────────────────────────────────────────────────────────────────

server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${JDBC_DATABASE_URL}                # e.g. jdbc:mysql://host:3306/quizhub?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${JDBC_DATABASE_USERNAME}
    password: ${JDBC_DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      # NEVER 'update' or 'create' in production — use Flyway/Liquibase for schema changes
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true    # safe for first migration on existing DB
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

app:
  jwt:
    # Production secret MUST be at least 64 chars; no default fallback
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRY_MS:86400000}
  cors:
    # Restrict to your actual prod domain(s), comma-separated
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  url: ${APP_URL}

logging:
  level:
    root: WARN
    com.accenture.quizhub: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

management:
  endpoint:
    health:
      # Don't expose internal component details to the public in prod
      show-details: when-authorized
      show-components: when-authorized
  endpoints:
    web:
      exposure:
        # Restrict to health + prometheus only; loggers/env require auth (anyRequest().authenticated())
        include: health,prometheus,metrics,info
