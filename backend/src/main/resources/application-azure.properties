# =============================================================================
# application-azure.properties — Azure APIM Gateway Profile
# =============================================================================
# Activates when: spring.profiles.active=azure
#
# PREREQUISITES:
#   1. Set environment variable: AZURE_APIM_API_KEY=<your-team-key>
#   2. Set environment variable: AZURE_APIM_ENDPOINT=<gateway-url>
#   3. Must be on Accenture VPN
#
# SECURITY: NEVER hardcode API keys here. Use environment variables only.
# =============================================================================

# ── AZURE OPENAI via APIM ────────────────────────────────────────────────────
spring.ai.azure.openai.endpoint=${AZURE_APIM_ENDPOINT:https://apim-gateway.azure-api.net/openai}
spring.ai.azure.openai.api-key=${AZURE_APIM_API_KEY:}
spring.ai.azure.openai.chat.enabled=true
spring.ai.azure.openai.chat.options.deployment-name=gpt-4.1-mini
spring.ai.azure.openai.chat.options.temperature=0.5
spring.ai.azure.openai.chat.options.max-tokens=1000

# ── Override autoconfigure exclusions: KEEP OpenAI excluded, REMOVE Azure exclusions ──
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration

# ── DISABLE OLLAMA in this profile ───────────────────────────────────────────
spring.ai.ollama.chat.enabled=false
spring.ai.ollama.embedding.enabled=false

# ── DISABLE OPENAI direct (use Azure wrapper instead) ────────────────────────
spring.ai.openai.chat.enabled=false
