<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Force no-cache so VS Code webview + all browsers always load latest bundle -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- MutationObserver: intercepts webpack-injected bundle.js script tag and adds ?v=timestamp
         so the browser treats it as a new URL and bypasses any disk cache -->
    <script>
      (function() {
        var v = Date.now();
        var obs = new MutationObserver(function(muts) {
          muts.forEach(function(m) {
            m.addedNodes.forEach(function(node) {
              if (node.tagName === 'SCRIPT' && node.src &&
                  node.src.includes('bundle.js') && !node.src.includes('?v=')) {
                node.src = node.src.split('?')[0] + '?v=' + v;
              }
              if (node.tagName === 'LINK' && node.href &&
                  node.href.includes('.css') && !node.href.includes('?v=')) {
                node.href = node.href.split('?')[0] + '?v=' + v;
              }
            });
          });
        });
        obs.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.svg?v=2" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7C3AED" />
    <!-- Font loading: preconnect + swap for faster rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <meta
      name="description"
      content="Smart Quiz AI Hub — Accenture Hack-N-Stack 2026"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>QuizHub AI | Bumble Bee</title>
    <!-- highlight.js — syntax highlighting for code blocks in question stems -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
