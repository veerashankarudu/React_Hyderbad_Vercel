# QuizHub AI — Full Production Stack
# Usage:
#   cp .env.prod.example .env.prod
#   docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Required env vars (set in .env.prod):
#   MYSQL_ROOT_PASSWORD, MYSQL_PASSWORD
#   JWT_SECRET (64+ chars)
#   OPENAI_API_KEY (optional)
#   MAIL_USERNAME, MAIL_PASSWORD (optional)

version: '3.9'

networks:
  quizhub-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:

services:

  # ── MySQL 8 ───────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: quizhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: quizhub
      MYSQL_USER: quizhub
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - quizhub-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "127.0.0.1:3306:3306"   # bind to localhost only — not exposed publicly

  # ── Redis 8 ───────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: quizhub-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - quizhub-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Spring Boot Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: quizhub-backend:latest
    container_name: quizhub-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JDBC_DATABASE_URL: jdbc:mysql://mysql:3306/quizhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      JDBC_DATABASE_USERNAME: quizhub
      JDBC_DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.office365.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      APP_URL: ${APP_URL:-http://localhost}
    networks:
      - quizhub-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  # ── React Frontend (Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""       # empty = same-origin (Nginx proxy handles /api/)
    image: quizhub-frontend:latest
    container_name: quizhub-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - quizhub-net
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  # ── Prometheus ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: quizhub-prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - quizhub-net
    ports:
      - "127.0.0.1:9090:9090"

  # ── Grafana ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: quizhub-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-quizhub}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - quizhub-net
    ports:
      - "127.0.0.1:3001:3000"
