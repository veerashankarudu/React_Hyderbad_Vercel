name: QuizHub AI — CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  #  Backend — Build, Test, Coverage
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Java 17 / Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: quizhub_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (skip tests first — fast compile check)
        run: mvn clean package -DskipTests -q

      - name: Run Tests
        run: mvn test --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ci-test-secret-key-at-least-64-characters-long-for-production

      - name: Coverage Report (JaCoCo)
        run: mvn verify -DskipTests=false --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ci-test-secret-key-at-least-64-characters-long-for-production

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: target/site/jacoco/jacoco.xml
          flags: backend
          fail_ci_if_error: false

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # ─────────────────────────────────────────────
  #  Frontend — Install, Test, Build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Node.js / React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: npm test -- --watchAll=false --coverage --passWithNoTests
        env:
          CI: true

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Build Production Bundle
        run: npm run build
        env:
          CI: false                  # treat React warnings as warnings, not errors
          REACT_APP_API_URL: http://localhost:8080

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ─────────────────────────────────────────────
  #  Docker Build (runs after both pass)
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image (no push — validation only)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: quizhub-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image (no push — validation only)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: quizhub-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
