global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'quizhub'

scrape_configs:

  # ── QuizHub Backend ─────────────────────────────────────────────────────────
  - job_name: 'quizhub-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          application: 'quizhub'
          environment: 'local'

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
